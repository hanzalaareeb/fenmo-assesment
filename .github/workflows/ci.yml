name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: 'ci-test-secret-key'
      DEBUG: 'True'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run tests
        run: uv run python manage.py test expenses
