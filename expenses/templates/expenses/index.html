<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
        h1 { margin-bottom: 20px; }
        h2 { margin: 20px 0 10px; font-size: 1.1rem; }

        form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 6px; }
        label { display: flex; flex-direction: column; font-size: 0.85rem; font-weight: 600; }
        label.full { grid-column: 1 / -1; }
        input, textarea, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; margin-top: 4px; }
        textarea { resize: vertical; min-height: 50px; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
        #submit-btn { grid-column: 1 / -1; background: #2563eb; color: white; }
        #submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }

        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .controls select { padding: 6px; }

        #status { padding: 10px; border-radius: 4px; margin-bottom: 10px; display: none; }
        #status.success { display: block; background: #dcfce7; color: #166534; }
        #status.error { display: block; background: #fee2e2; color: #991b1b; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
        th { background: #f9fafb; font-size: 0.85rem; text-transform: uppercase; }
        td { font-size: 0.9rem; }

        .total { font-size: 1.1rem; font-weight: 700; margin-top: 10px; padding: 10px; background: #f0f9ff; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Expense Tracker</h1>

    <form id="expense-form">
        <label>
            Amount
            <input name="amount" type="number" step="0.01" min="0.01" required>
        </label>
        <label>
            Category
            <input name="category" type="text" required>
        </label>
        <label>
            Date
            <input name="date" type="date" required>
        </label>
        <label class="full">
            Description
            <textarea name="description"></textarea>
        </label>
        <button type="submit" id="submit-btn">Add Expense</button>
    </form>

    <div id="status"></div>

    <h2>Expenses</h2>
    <div class="controls">
        <select id="category-filter">
            <option value="">All Categories</option>
        </select>
        <select id="sort-select">
            <option value="date_desc">Newest First</option>
            <option value="date_asc">Oldest First</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="expense-list"></tbody>
    </table>

    <div class="total" id="total-display">Total: &#8377;0.00</div>

    <script>
        const form = document.getElementById("expense-form");
        const submitBtn = document.getElementById("submit-btn");
        const statusDiv = document.getElementById("status");
        const tbody = document.getElementById("expense-list");
        const totalDisplay = document.getElementById("total-display");
        const categoryFilter = document.getElementById("category-filter");
        const sortSelect = document.getElementById("sort-select");

        let currentIdempotencyKey = null;

        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type;
            setTimeout(() => { statusDiv.className = ""; }, 3000);
        }

        async function loadExpenses() {
            const params = new URLSearchParams();
            const cat = categoryFilter.value;
            if (cat) params.set("category", cat);
            params.set("sort", sortSelect.value);

            try {
                const resp = await fetch("/api/expenses?" + params.toString());
                const data = await resp.json();

                tbody.innerHTML = "";
                data.expenses.forEach(e => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `<td>${e.date}</td><td>${e.category}</td><td>${e.description || ""}</td><td>&#8377;${e.amount}</td>`;
                    tbody.appendChild(tr);
                });

                totalDisplay.textContent = "Total: \u20B9" + data.total;

                // Update category filter options (preserve selection)
                const selected = categoryFilter.value;
                const categories = [...new Set(data.expenses.map(e => e.category))].sort();
                // Only update if filtering by "All"
                if (!selected) {
                    categoryFilter.innerHTML = '<option value="">All Categories</option>';
                    categories.forEach(c => {
                        categoryFilter.innerHTML += `<option value="${c}">${c}</option>`;
                    });
                }
            } catch {
                showStatus("Failed to load expenses.", "error");
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;

            if (!currentIdempotencyKey) {
                currentIdempotencyKey = crypto.randomUUID();
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            try {
                const resp = await fetch("/api/expenses", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Idempotency-Key": currentIdempotencyKey,
                    },
                    body: JSON.stringify(payload),
                });

                if (resp.ok) {
                    showStatus("Expense added!", "success");
                    form.reset();
                    currentIdempotencyKey = null;
                    // Reset category filter to reload all categories
                    categoryFilter.value = "";
                    await loadExpenses();
                } else {
                    const errors = await resp.json();
                    const msg = Object.values(errors).flat().join(", ");
                    showStatus(msg, "error");
                }
            } catch {
                showStatus("Network error. Please try again.", "error");
            } finally {
                submitBtn.disabled = false;
            }
        });

        categoryFilter.addEventListener("change", loadExpenses);
        sortSelect.addEventListener("change", loadExpenses);

        // Set default date to today
        form.querySelector('[name="date"]').valueAsDate = new Date();

        loadExpenses();
    </script>
</body>
</html>
